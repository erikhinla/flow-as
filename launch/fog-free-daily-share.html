    <main id="main-content">
      <section class="cinema-scene cinema-scene--hero fogfree-daily" id="top" aria-labelledby="hero-title">
        <video
          class="cinema-bg"
          src="/assets/foglift/i-cleared-my-fog-today.mp4"

        <div class="cinema-shell fogfree-daily__copy">

            <a class="cinema-link" href="/fog-free-daily">Get Fog-Free Daily</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      document.querySelectorAll("video[autoplay]").forEach((video) => {
        video.muted = true;
        video.defaultMuted = true;
        video.setAttribute("muted", "");
        video.setAttribute("playsinline", "");
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          video.removeAttribute("autoplay");
          video.pause();
          return;
        }
        const startVideo = () => video.play().catch(() => video.classList.add("is-paused"));
        if (video.readyState >= 2) startVideo();
        else video.addEventListener("canplay", startVideo, { once: true });
      });
    </script>
  </body>
