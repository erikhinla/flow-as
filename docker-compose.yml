services:
  flow-gateway:
    build:
      context: ./intake-webhook
    container_name: flow-gateway
    restart: unless-stopped
    environment:
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:-change-me}
    volumes:
      - intake_data:/data/intake
    ports:
      - "8080:8080"
    networks:
      - flow-internal

  bizbrain-lite:
    build:
      context: .
      dockerfile: services/bizbrain_lite/Dockerfile
    container_name: flow-orchestrator
    restart: unless-stopped
    environment:
      BIZBRAIN_ENV: ${BIZBRAIN_ENV:-prod}
      BIZBRAIN_API_TOKEN: ${BIZBRAIN_API_TOKEN:-change-me}
      BIZBRAIN_REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://flow_user:${FLOW_DB_PASSWORD:-change-me}@postgres:5432/flow_agent_os
      FLOW_STATE_DIR: /root/.openclaw/state
      SOCIAL_HUB_API_ORIGIN: ${SOCIAL_HUB_API_ORIGIN:-http://localhost:5173}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ${HOME}/.openclaw/state:/root/.openclaw/state
      - ./runtime/reviews:/app/runtime/reviews
      - ./runtime/queues:/app/runtime/queues
    ports:
      - "18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=5)"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - flow-internal

  flow-dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: flow-dashboard
    restart: unless-stopped
    environment:
      DASHBOARD_BASIC_AUTH_USER: ${DASHBOARD_BASIC_AUTH_USER:-admin}
      DASHBOARD_BASIC_AUTH_PASSWORD: ${DASHBOARD_BASIC_AUTH_PASSWORD:-}
      BIZBRAIN_API_TOKEN: ${BIZBRAIN_API_TOKEN:-change-me}
    ports:
      - "5173:80"
    depends_on:
      bizbrain-lite:
        condition: service_healthy
    networks:
      - flow-internal

  openclaw-alpha:
    build:
      context: .
      dockerfile: services/bizbrain_lite/Dockerfile
    container_name: openclaw-alpha
    restart: unless-stopped
    command: ["python", "scripts/openclaw_runtime.py", "--role", "alpha", "--port", "18789"]
    environment:
      FLOW_STATE_DIR: /root/.openclaw/state
      OPENCLAW_POLL_INTERVAL: ${OPENCLAW_POLL_INTERVAL:-2}
    volumes:
      - ${HOME}/.openclaw/state:/root/.openclaw/state
    ports:
      - "18789:18789"
    depends_on:
      bizbrain-lite:
        condition: service_healthy
    networks:
      - flow-internal

  openclaw-beta:
    build:
      context: .
      dockerfile: services/bizbrain_lite/Dockerfile
    container_name: openclaw-beta
    restart: unless-stopped
    command: ["python", "scripts/openclaw_runtime.py", "--role", "beta", "--port", "18790"]
    environment:
      FLOW_STATE_DIR: /root/.openclaw/state
      OPENCLAW_POLL_INTERVAL: ${OPENCLAW_POLL_INTERVAL:-2}
    volumes:
      - ${HOME}/.openclaw/state:/root/.openclaw/state
    ports:
      - "18790:18790"
    depends_on:
      bizbrain-lite:
        condition: service_healthy
    networks:
      - flow-internal

  agent-zero-gamma:
    build:
      context: .
      dockerfile: services/bizbrain_lite/Dockerfile
    container_name: agent-zero-gamma
    restart: unless-stopped
    command: ["python", "scripts/gamma_runtime.py", "--port", "18800"]
    environment:
      FLOW_STATE_DIR: /root/.openclaw/state
    volumes:
      - ${HOME}/.openclaw/state:/root/.openclaw/state
    ports:
      - "18800:18800"
    depends_on:
      bizbrain-lite:
        condition: service_healthy
    networks:
      - flow-internal

  flow-discord-bot:
    build:
      context: .
      dockerfile: services/discord_bot/Dockerfile
    container_name: flow-discord-bot
    restart: unless-stopped
    profiles: ["discord"]
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      BIZBRAIN_URL: http://bizbrain-lite:8000
      BIZBRAIN_API_TOKEN: ${BIZBRAIN_API_TOKEN:-change-me}
    depends_on:
      bizbrain-lite:
        condition: service_healthy
    networks:
      - flow-internal

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flow-internal

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flow_user
      POSTGRES_PASSWORD: ${FLOW_DB_PASSWORD:-change-me}
      POSTGRES_DB: flow_agent_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow_user -d flow_agent_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flow-internal

networks:
  flow-internal:
    name: flow-internal
    driver: bridge

volumes:
  intake_data:
  redis_data:
  postgres_data:
