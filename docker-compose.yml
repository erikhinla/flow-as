# =============================================================================
# FLOW Agent OS — Hostinger VPS
# Services:
#   Agents: OpenClaw | AgentZero | Hermes
#   Dashboard: Portainer CE
#   Social Media: Postiz
# =============================================================================

services:

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "9000:9000"
      - "9443:9443"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - main_net

  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    hostname: portainer-agent
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - main_net

  # ---------------------------------------------------------------------------
  # OPENCLAW - Fixed
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/erikhinla/clawdbot:latest
    container_name: openclaw
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      CLAWDBOT_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      CLAWDBOT_GATEWAY_MODE: local
    volumes:
      - openclaw_config:/home/node/.clawdbot
      - openclaw_workspace:/home/node/clawd
    ports:
      - "18789:18789"
      - "18790:18790"
    init: true
    command:
      - "node"
      - "dist/index.js"
      - "gateway"
      - "--bind"
      - "lan"
      - "--port"
      - "18789"
      - "--allow-unconfigured"
      - "--mode"
      - "local"
    networks:
      - main_net

  # ---------------------------------------------------------------------------
  # AGENT ZERO
  # ---------------------------------------------------------------------------
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: agent-zero
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      A0_AUTH_LOGIN: ${A0_AUTH_LOGIN:-admin}
      A0_AUTH_PASSWORD: ${A0_AUTH_PASSWORD}
    volumes:
      - agent_zero_data:/a0/usr
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "50080:80"
      - "50022:22"
    networks:
      - main_net

  # ---------------------------------------------------------------------------
  # HERMES - Fixed (keep alive)
  # ---------------------------------------------------------------------------
  hermes:
    image: ghcr.io/erikhinla/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      HERMES_DEFAULT_MODEL: ${HERMES_DEFAULT_MODEL:-claude-sonnet-4-5}
      HERMES_GATEWAY_ENABLED: "true"
      HERMES_GATEWAY_PORT: "50090"
      HERMES_GATEWAY_HOST: "0.0.0.0"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
    volumes:
      - hermes_data:/root/.hermes
      - hermes_workspace:/workspace
    ports:
      - "50090:50090"
    networks:
      - main_net
    command: ["tail", "-f", "/dev/null"]   # Keep container running

  # ---------------------------------------------------------------------------
  # POSTIZ + DATABASES
  # ---------------------------------------------------------------------------
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MAIN_URL: "http://${POSTIZ_DOMAIN:-localhost:5000}"
      FRONTEND_URL: "http://${POSTIZ_DOMAIN:-localhost:5000}"
      NEXT_PUBLIC_BACKEND_URL: "http://${POSTIZ_DOMAIN:-localhost:5000}/api"
      BACKEND_INTERNAL_URL: "http://postiz:3000"
      JWT_SECRET: ${POSTIZ_JWT_SECRET}
      DATABASE_URL: "postgresql://postiz-user:${POSTIZ_DB_PASSWORD}@postiz-postgres:5432/postiz-db"
      REDIS_URL: "redis://postiz-redis:6379"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: ${POSTIZ_DISABLE_REGISTRATION:-false}
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - postiz_config:/config/
      - postiz_uploads:/uploads/
    networks:
      - main_net
    depends_on:
      postiz_postgres:
        condition: service_healthy
      postiz_redis:
        condition: service_healthy

  postiz_postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz-user
      POSTGRES_PASSWORD: ${POSTIZ_DB_PASSWORD}
      POSTGRES_DB: postiz-db
    volumes:
      - postiz_postgres_data:/var/lib/postgresql/data
    networks:
      - main_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postiz-user -d postiz-db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postiz_redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: unless-stopped
    volumes:
      - postiz_redis_data:/data
    networks:
      - main_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  main_net:
    driver: bridge

volumes:
  portainer_data:
    name: portainer_data
  openclaw_config:
    name: openclaw_config
  openclaw_workspace:
    name: openclaw_workspace
  agent_zero_data:
    name: agent_zero_data
  hermes_data:
    name: hermes_data
  hermes_workspace:
    name: hermes_workspace
  postiz_config:
    name: postiz_config
  postiz_uploads:
    name: postiz_uploads
  postiz_postgres_data:
    name: postiz_postgres_data
  postiz_redis_data:
    name: postiz_redis_data
