# =============================================================================
# FLOW Agent OS — Hostinger VPS
# Services:
#   Agents: OpenClaw (clawdbot) | AgentZero | Hermes
#   Dashboard: Portainer CE
#   Social Media: Postiz (+ PostgreSQL, Redis)
# =============================================================================
# Usage:
#   cp .env.example .env    # fill in your secrets
#   docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PORTAINER — Container Dashboard
  # Access: https://<VPS_IP>:9443
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "9000:9000"       # HTTP (redirect to HTTPS)
      - "9443:9443"       # HTTPS Web UI
      - "8000:8000"       # Edge agent tunnel (optional)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - main_net

  # ---------------------------------------------------------------------------
  # OPENCLAW — Front-door router / orchestrator (clawdbot)
  # Access: http://<VPS_IP>:18789
  # Repo: github.com/erikhinla/clawdbot
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/erikhinla/clawdbot:latest
    container_name: openclaw
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      CLAWDBOT_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - openclaw_config:/home/node/.clawdbot
      - openclaw_workspace:/home/node/clawd
    ports:
      - "18789:18789"     # Gateway HTTP API
      - "18790:18790"     # Bridge port
    init: true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind", "lan",
        "--port", "18789"
      ]
    networks:
      - main_net
    labels:
      flow.agent: "openclaw"
      flow.role: "orchestrator"
      flow.tier: "1"

  # ---------------------------------------------------------------------------
  # AGENT ZERO — Deep execution engine
  # Access: http://<VPS_IP>:50080
  # Image: agent0ai/agent-zero (official)
  # ---------------------------------------------------------------------------
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: agent-zero
    restart: unless-stopped
    environment:
      # LLM Provider keys — set at least one
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Auth for the web UI (set these!)
      A0_AUTH_LOGIN: ${A0_AUTH_LOGIN:-admin}
      A0_AUTH_PASSWORD: ${A0_AUTH_PASSWORD}
    volumes:
      - agent_zero_data:/a0/usr       # Persistent memory, files, settings
      - /var/run/docker.sock:/var/run/docker.sock  # For spawning sub-agents
    ports:
      - "50080:80"        # Web UI
      - "50022:22"        # SSH into container (optional)
    networks:
      - main_net
    labels:
      flow.agent: "agent-zero"
      flow.role: "executor"
      flow.tier: "2"

  # ---------------------------------------------------------------------------
  # HERMES — Self-improving CLI agent (NousResearch fork)
  # Access: http://<VPS_IP>:50090 (gateway mode)
  # Repo: github.com/erikhinla/hermes-agent
  # ---------------------------------------------------------------------------
  hermes:
    image: ghcr.io/erikhinla/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    environment:
      # LLM Providers
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Hermes-specific
      HERMES_DEFAULT_MODEL: ${HERMES_DEFAULT_MODEL:-claude-sonnet-4-5}
      HERMES_GATEWAY_ENABLED: "true"
      HERMES_GATEWAY_PORT: "50090"
      HERMES_GATEWAY_HOST: "0.0.0.0"
      # Optional integrations
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
    volumes:
      - hermes_data:/root/.hermes    # Config, skills, memory
      - hermes_workspace:/workspace  # Agent working directory
    ports:
      - "50090:50090"     # Gateway HTTP API
    networks:
      - main_net
    labels:
      flow.agent: "hermes"
      flow.role: "specialist"
      flow.tier: "2"

  # ---------------------------------------------------------------------------
  # POSTIZ — Social Media Management Platform
  # Access: http://<VPS_IP>:5000
  # Repo: github.com/gitroomhq/postiz-app
  # ---------------------------------------------------------------------------
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # === General Settings ===
      MAIN_URL: "http://${POSTIZ_DOMAIN:-localhost:5000}"
      FRONTEND_URL: "http://${POSTIZ_DOMAIN:-localhost:5000}"
      NEXT_PUBLIC_BACKEND_URL: "http://${POSTIZ_DOMAIN:-localhost:5000}/api"
      BACKEND_INTERNAL_URL: "http://postiz:3000"

      # === Security ===
      JWT_SECRET: ${POSTIZ_JWT_SECRET}

      # === Database & Redis ===
      DATABASE_URL: "postgresql://postiz-user:${POSTIZ_DB_PASSWORD}@postiz-postgres:5432/postiz-db"
      REDIS_URL: "redis://postiz-redis:6379"

      # === App Configuration ===
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: ${POSTIZ_DISABLE_REGISTRATION:-false}

      # === Storage ===
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"

      # === Social Media & Integrations ===
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - postiz_config:/config/
      - postiz_uploads:/uploads/
    networks:
      - main_net
    depends_on:
      postiz_postgres:
        condition: service_healthy
      postiz_redis:
        condition: service_healthy
    labels:
      flow.service: "postiz"
      flow.tier: "1"

  # ---------------------------------------------------------------------------
  # POSTIZ — PostgreSQL Database
  # ---------------------------------------------------------------------------
  postiz_postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz-user
      POSTGRES_PASSWORD: ${POSTIZ_DB_PASSWORD}
      POSTGRES_DB: postiz-db
    volumes:
      - postiz_postgres_data:/var/lib/postgresql/data
    networks:
      - main_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postiz-user -d postiz-db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # POSTIZ — Redis Cache
  # ---------------------------------------------------------------------------
  postiz_redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: unless-stopped
    volumes:
      - postiz_redis_data:/data
    networks:
      - main_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  main_net:
    driver: bridge
    name: flow_main_net

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  # Portainer
  portainer_data:
    name: portainer_data
  # OpenClaw
  openclaw_config:
    name: openclaw_config
  openclaw_workspace:
    name: openclaw_workspace
  # Agent Zero
  agent_zero_data:
    name: agent_zero_data
  # Hermes
  hermes_data:
    name: hermes_data
  hermes_workspace:
    name: hermes_workspace
  # Postiz
  postiz_config:
    name: postiz_config
  postiz_uploads:
    name: postiz_uploads
  postiz_postgres_data:
    name: postiz_postgres_data
  postiz_redis_data:
    name: postiz_redis_data
