name: Build & Push intake-webhook to GHCR

on:
  push:
    branches: [main]
    paths: ["intake-webhook/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: erikhinla/intake-webhook

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./intake-webhook
          push: true
          tags: ghcr.io/erikhinla/intake-webhook:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
