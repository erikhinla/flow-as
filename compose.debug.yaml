services:
  flowas:
    image: flowas
    build:
      context: .
      dockerfile: ./Dockerfile
    command: ["sh", "-c", "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 services/bizbrain_lite/app/schemas/handoff.py "]
    ports:
      - 5678:5678
