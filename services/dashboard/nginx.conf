events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Rate limiting zones
    # Dashboard auth protection (prevent brute force)
    limit_req_zone $binary_remote_addr zone=dashboard_auth:10m rate=60r/s;
    
    # API proxy protection (general API usage)
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    
    # Intake endpoints protection (stricter for high-risk operations)
    limit_req_zone $binary_remote_addr zone=intake_strict:10m rate=30r/m;
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Handle client-side routing with basic authentication for dashboard only
        location / {
            # Basic Authentication for Dashboard only
            auth_basic "FLOW Agent AS Dashboard";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            # Dashboard rate limiting (prevent brute force on auth)
            limit_req zone=dashboard_auth burst=50 nodelay;
            
            try_files $uri $uri/ /index.html;
        }

        # Health endpoint - no rate limiting for operational monitoring (exact match)
        location = /api/health {
            proxy_pass http://bizbrain-lite:8000/v1/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Intake endpoints - stricter rate limiting
        location ~* ^/api/intake/(.*)$ {
            limit_req zone=intake_strict burst=10 nodelay;
            
            proxy_pass http://bizbrain-lite:8000/v1/intake/$1;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Api-Token';
        }

        # API proxy to BizBrain Lite - general rate limiting
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            
            proxy_pass http://bizbrain-lite:8000/v1/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Api-Token';
        }

        # Static assets with caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            # Basic Authentication for Dashboard assets
            auth_basic "FLOW Agent AS Dashboard";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            # Dashboard rate limiting for assets
            limit_req zone=dashboard_auth burst=50 nodelay;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }
}
